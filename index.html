<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GATE CBT Platform</title>

<link rel="stylesheet" href="css/main.css">

</head>

<body>

<header class="navbar">

<div class="nav-left">

<div class="logo">GATE CBT</div>

</div>

<div class="nav-right">

<div class="timer" id="timer">03:00:00</div>

<button class="btn-secondary" onclick="openCalculator()">
Calculator
</button>

</div>

</header>


<div class="exam-layout">

<section class="question-container">

<div class="question-header">

<span id="question-number"></span>

</div>

<div class="question-box">

<p id="question-text"></p>

<div class="options" id="options"></div>

</div>

<div class="question-actions">

<button onclick="prevQuestion()">Previous</button>

<button onclick="markReview()">Mark Review</button>

<button onclick="clearAnswer()">Clear</button>

<button class="btn-primary" onclick="nextQuestion()">
Save & Next
</button>

</div>

</section>


<aside class="palette">

<h3>Question Palette</h3>

<div id="palette-grid"></div>

<button class="submit-btn">Submit Test</button>

</aside>

</div>

<script src="js/main.js"></script>

</body>
</html>
