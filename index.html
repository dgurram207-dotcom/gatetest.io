<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GATE CBT Test Platform</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="topbar">

<div class="logo">
GATE CBT MOCK
</div>

<div class="exam-info">

<div id="timer">03:00:00</div>

<button class="calc-btn" onclick="openCalculator()">
Calculator
</button>

</div>

</header>


<div class="layout">

<main class="question-area">

<div class="question-header">

<h2 id="q-number"></h2>

</div>

<div class="question-body">

<p id="question-text"></p>

<div class="options">

<label class="option">
<input type="radio" name="option" value="A">
<span id="optA"></span>
</label>

<label class="option">
<input type="radio" name="option" value="B">
<span id="optB"></span>
</label>

<label class="option">
<input type="radio" name="option" value="C">
<span id="optC"></span>
</label>

<label class="option">
<input type="radio" name="option" value="D">
<span id="optD"></span>
</label>

</div>

</div>

<div class="actions">

<button onclick="previous()">Previous</button>

<button onclick="markReview()">Mark for Review</button>

<button onclick="clearResponse()">Clear Response</button>

<button class="next-btn" onclick="next()">Save & Next</button>

</div>

</main>


<aside class="palette">

<h3>Question Palette</h3>

<div id="palette-grid"></div>

<div class="legend">

<p><span class="box answered"></span> Answered</p>
<p><span class="box notanswered"></span> Not Answered</p>
<p><span class="box review"></span> Review</p>

</div>

<button class="submit-btn">Submit Test</button>

</aside>

</div>

<script src="app.js"></script>

</body>
</html>
