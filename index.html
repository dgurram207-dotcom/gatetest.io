<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GATE Premium CBT</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="topbar">

<div class="logo">
GATE CBT
</div>

<div class="tools">

<div id="timer">03:00:00</div>

<button class="btn ghost" onclick="openCalculator()">
Calculator
</button>

</div>

</header>


<div class="layout">

<main class="question-card">

<div class="question-title" id="qNumber"></div>

<p class="question-text" id="qText"></p>

<div class="options" id="options"></div>

<div class="controls">

<button onclick="prevQuestion()">Previous</button>

<button onclick="markReview()">Mark Review</button>

<button onclick="clearAnswer()">Clear</button>

<button class="primary" onclick="nextQuestion()">Save & Next</button>

</div>

</main>


<aside class="palette">

<h3>Question Palette</h3>

<div id="palette"></div>

<div class="legend">

<div><span class="box answered"></span> Answered</div>

<div><span class="box notanswered"></span> Not Answered</div>

<div><span class="box review"></span> Review</div>

</div>

<button class="submit">Submit Test</button>

</aside>

</div>

<script src="js/app.js"></script>

</body>
</html>
