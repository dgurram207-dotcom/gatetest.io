<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GATE CBT Platform</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="header">

<div class="brand">

<h1>GATE CBT</h1>

</div>

<div class="exam-tools">

<div id="timer">03:00:00</div>

<button class="tool-btn" onclick="openCalculator()">
Calculator
</button>

</div>

</header>


<div class="container">

<main class="question-panel">

<div class="question-meta">

<span id="question-number"></span>

</div>

<div class="question-content">

<p id="question-text"></p>

<form id="options">

<label class="option">
<input type="radio" name="answer" value="A">
<span id="optA"></span>
</label>

<label class="option">
<input type="radio" name="answer" value="B">
<span id="optB"></span>
</label>

<label class="option">
<input type="radio" name="answer" value="C">
<span id="optC"></span>
</label>

<label class="option">
<input type="radio" name="answer" value="D">
<span id="optD"></span>
</label>

</form>

</div>

<div class="controls">

<button onclick="prevQuestion()">Previous</button>

<button onclick="markReview()">Mark Review</button>

<button onclick="clearAnswer()">Clear</button>

<button class="primary" onclick="nextQuestion()">
Save & Next
</button>

</div>

</main>


<aside class="palette-panel">

<h3>Question Palette</h3>

<div id="palette"></div>

<div class="legend">

<div>
<span class="box answered"></span>
Answered
</div>

<div>
<span class="box notanswered"></span>
Not Answered
</div>

<div>
<span class="box review"></span>
Review
</div>

</div>

<button class="submit">Submit Test</button>

</aside>

</div>

<script src="app.js"></script>

</body>
</html>
